<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather AI Assistant - Twój Doradca Ubiory</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Blobs for vibrant iOS Glassmorphism -->
    <div class="bg-blob blob-1" aria-hidden="true"></div>
    <div class="bg-blob blob-2" aria-hidden="true"></div>

    <main class="app-container">
        <!-- Login Card with Glassmorphism -->
        <section id="login-container" class="login-card" aria-label="Logowanie użytkownika">
            <header class="login-header">
                <div class="login-logo" role="img" aria-label="AuraStyle Logo">☀️</div>
                <h2>AuraStyle AI</h2>
                <p>Wprowadź dane logowania, aby kontynuować</p>
            </header>
            <div class="login-body">
                <div id="login-error" class="login-error-msg hidden" role="alert"></div>
                <div class="input-field">
                    <label for="username-input">Użytkownik</label>
                    <input type="text" id="username-input" placeholder="Nazwa użytkownika..." autocomplete="username">
                </div>
                <div class="input-field">
                    <label for="password-input">Hasło</label>
                    <input type="password" id="password-input" placeholder="Hasło..." autocomplete="current-password">
                </div>
                <button id="login-btn" class="login-submit-btn">Zaloguj się</button>
                <div class="login-hint">
                    <span>Konto testowe: <strong>admin</strong> / <strong>admin123</strong></span>
                </div>
            </div>
        </section>

        <!-- Main Chat Box with Glassmorphism -->
        <section id="chat-container" class="chat-container hidden" aria-label="Asystent pogodowy czat">
            
            <!-- Header -->
            <header class="chat-header">
                <div class="bot-info">
                    <div class="bot-avatar" role="img" aria-label="Bot Avatar">☀️</div>
                    <div class="bot-details">
                        <h1>AuraStyle AI</h1>
                        <span class="bot-status">Online • Doradca pogodowy</span>
                    </div>
                </div>
                <div class="header-controls">
                    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Przełącz motyw (Jasny/Ciemny)" title="Przełącz motyw">
                        <span class="toggle-icon">🌙</span>
                    </button>
                    <button id="logout-btn" class="logout-btn" aria-label="Wyloguj się" title="Wyloguj się">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Chat box where messages go -->
            <div id="chat-box" class="chat-messages" role="log" aria-live="polite" aria-label="Historia konwersacji">
                <!-- Messages will be injected dynamically -->
            </div>

            <!-- Typing indicator -->
            <div id="typing-indicator" class="typing-indicator-container hidden" aria-hidden="true">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>

            <!-- Input area -->
            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="user-input" 
                        placeholder="Wpisz np. 'Jest 7 stopni i pada deszcz' lub miasto..." 
                        aria-label="Wpisz opis pogody lub miasto" 
                        autocomplete="off"
                    >
                    <button id="send-btn" aria-label="Wyślij wiadomość" title="Wyślij">
                        <svg viewBox="0 0 24 24" width="24" height="24" class="send-icon" aria-hidden="true">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"></path>
                        </svg>
                    </button>
                </div>
                <div class="quick-tags">
                    <button class="quick-tag-btn" data-text="Jest 5 stopni i wieje silny wiatr">💨 5°C & Wiatr</button>
                    <button class="quick-tag-btn" data-text="Pada ulewny deszcz, 12 stopni">🌧️ Ulewa & 12°C</button>
                    <button class="quick-tag-btn" data-text="Słonecznie i 25 stopni">☀️ Słońce & 25°C</button>
                </div>
            </footer>

        </section>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
